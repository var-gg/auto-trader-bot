name: backtest-parity-tests

on:
  push:
    paths:
      - 'backtest_app/**'
      - 'shared/**'
      - 'tests/parity/**'
      - 'tests/golden/test_backtest_execution_model.py'
      - 'tests/fixtures/**'
      - 'requirements-backtest.txt'
      - 'requirements-common.txt'
      - 'Dockerfile.backtest'
      - '.github/workflows/backtest-parity-tests.yml'
  pull_request:
    paths:
      - 'backtest_app/**'
      - 'shared/**'
      - 'tests/parity/**'
      - 'tests/golden/test_backtest_execution_model.py'
      - 'tests/fixtures/**'
      - 'requirements-backtest.txt'
      - 'requirements-common.txt'
      - 'Dockerfile.backtest'
      - '.github/workflows/backtest-parity-tests.yml'

jobs:
  backtest-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backtest dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-backtest.txt pytest
      - name: Run backtest execution model tests
        run: pytest -q tests/golden/test_backtest_execution_model.py
      - name: Run parity tests
        run: pytest -q tests/parity/test_live_backtest_parity.py
      - name: Run Optuna backtest tests
        run: pytest -q tests/golden/test_optuna_backtest_runtime.py
      - name: Verify CLI batch runner
        run: |
          python -m backtest_app.runner \
            --scenario-id ci-demo \
            --market US \
            --start-date 2026-03-01 \
            --end-date 2026-03-24 \
            --symbols NVDA,AAPL \
            --data tests/fixtures/backtest_historical_fixture.json > /tmp/backtest-output.json
          test -s /tmp/backtest-output.json
