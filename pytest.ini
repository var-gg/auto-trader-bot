[pytest]
testpaths = tests
addopts = -ra --strict-markers
markers =
    golden: deterministic golden coverage
    parity: live and backtest parity coverage
    contract: route and adapter contract coverage
    shadow: shadow replay coverage
    research: research and backtest runtime coverage
    harness: harness docs, schema, and tooling coverage
    live_safe: safe-to-run checks against the live boundary without live money side effects
    slow: slower or higher-latency checks
